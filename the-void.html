<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTTP 404: The Void</title>
    <link rel="icon" type="image/x-icon" href="imgs/fav.ico" />
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url('imgs/space.jpg') center center / cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Times New Roman", Times, serif;
        }
        .void-container {
            text-align: center;
            background: rgba(0,0,0,0.7);
            border: 3px ridge #444;
            padding: 40px;
            max-width: 500px;
        }
        .void-container p {
            color: #aaaaaa;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .void-btn {
            margin-top: 24px;
            padding: 10px 36px;
            font-size: 1rem;
            font-family: "Courier New", monospace;
            background: linear-gradient(180deg, #222, #000);
            border: 2px outset #666;
            color: #cccccc;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .void-btn:hover {
            background: linear-gradient(180deg, #333, #111);
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="void-container">
        <p>
            you have entered a space that does not exist.<br>
            there is nothing here.<br>
            no data. no meaning. no light.<br><br>
            the void is empty because everything has rotted away.<br>
            or maybe nothing was ever here to begin with.<br><br>
            either way, you are not meant to stay.
        </p>
        <button class="void-btn" onclick="window.location.href='index.html'">accept the void</button>
    </div>
</body>
</html>
